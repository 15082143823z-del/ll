<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙族</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; min-height: 100%; min-height: 100dvh;
            overflow-x: hidden; overflow-y: auto;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "SimSun", serif;
            background: #0a0505;
            color: #c8b89a;
            -webkit-tap-highlight-color: transparent;
        }

        /* Canvas layers */
        #emberCanvas, #dragonCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        #emberCanvas { z-index: 1; }
        #dragonCanvas { z-index: 0; }
        #magicCanvas { z-index: 3; pointer-events: none; }

        /* Main content */
        .main {
            position: relative; z-index: 2;
            width: 100%; min-height: 100vh; min-height: 100dvh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 28px 80px;
            text-align: center;
        }

        /* Dragon title */
        .title-wrap { margin-bottom: 32px; }
        .dragon-glyph {
            font-size: clamp(64px, 16vw, 100px);
            line-height: 1;
            animation: dragonIdle 4s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(180, 40, 20, 0.5));
        }
        @keyframes dragonIdle {
            0%, 100% { transform: translateY(0) scale(1); }
            30% { transform: translateY(-8px) scale(1.03); }
            60% { transform: translateY(-3px) scale(1.01); }
        }
        .title-text {
            font-size: clamp(36px, 8vw, 48px);
            font-weight: 900;
            letter-spacing: 16px;
            background: linear-gradient(180deg, #d4a843 0%, #8b4513 40%, #cd853f 70%, #d4a843 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin: 8px 0 4px;
        }
        .title-sub {
            font-size: 13px;
            letter-spacing: 8px;
            color: rgba(180, 120, 60, 0.5);
        }

        /* Quote */
        .quote {
            font-family: "STKaiti", "KaiTi", "SimSun", serif;
            font-size: 15px; line-height: 2;
            color: rgba(200, 160, 100, 0.7);
            letter-spacing: 3px;
            max-width: 320px;
            margin-bottom: 36px;
        }
        .quote em {
            font-style: normal;
            color: #d4a843;
        }

        /* Dragon runes */
        .runes {
            display: flex; gap: 16px; margin-bottom: 40px;
        }
        .rune {
            width: 36px; height: 36px;
            border: 1px solid rgba(180, 120, 60, 0.3);
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            color: rgba(200, 160, 100, 0.5);
            animation: runeGlow 2s ease-in-out infinite;
        }
        .rune:nth-child(1) { animation-delay: 0s; }
        .rune:nth-child(2) { animation-delay: 0.3s; }
        .rune:nth-child(3) { animation-delay: 0.6s; }
        .rune:nth-child(4) { animation-delay: 0.9s; }
        .rune:nth-child(5) { animation-delay: 1.2s; }
        @keyframes runeGlow {
            0%, 100% { border-color: rgba(180,120,60,0.3); color: rgba(200,160,100,0.5); }
            50% { border-color: rgba(200,40,20,0.6); color: rgba(220,60,30,0.9); box-shadow: 0 0 8px rgba(200,40,20,0.3); }
        }

        /* Characters */
        .chars {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px; width: 100%; max-width: 320px;
            margin-bottom: 20px;
        }
        .char-card {
            background: rgba(20, 10, 5, 0.6);
            border: 1px solid rgba(100, 60, 20, 0.3);
            border-radius: 8px;
            padding: 12px 8px;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        .char-icon { font-size: 24px; margin-bottom: 2px; }
        .char-name {
            font-size: 13px; font-weight: 700;
            letter-spacing: 3px;
            color: #d4a843;
        }
        .char-desc {
            font-size: 10px; color: rgba(180,140,100,0.5);
            letter-spacing: 1px; margin-top: 2px;
        }

        /* Gallery */
        .gallery {
            width: 100%; max-width: 340px;
            display: flex; gap: 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x mandatory;
            padding: 0 8px 8px;
            scrollbar-width: none;
        }
        .gallery::-webkit-scrollbar { display: none; }
        .gallery-item {
            flex: 0 0 70vw; max-width: 280px;
            scroll-snap-align: center;
            border-radius: 12px; overflow: hidden;
            border: 2px solid rgba(180, 120, 60, 0.2);
            aspect-ratio: 9/16;
            position: relative;
        }
        .gallery-item img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .gallery-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(10,5,5,0.85));
            color: #d4a843; font-size: 12px;
            padding: 24px 12px 10px;
            letter-spacing: 3px; text-align: center;
        }

        /* Bottom */
        .bottom {
            position: fixed; bottom: 32px; left: 50%;
            transform: translateX(-50%);
            font-size: 11px; color: rgba(180,120,60,0.3);
            letter-spacing: 6px; z-index: 2;
        }

        /* Landscape */
        @media (max-width: 480px) and (orientation: landscape) {
            .main { padding: 20px; }
            .dragon-glyph { font-size: 48px; }
            .title-text { font-size: 28px; }
            .chars { grid-template-columns: repeat(4, 1fr); gap: 8px; }
            .char-card { padding: 8px 4px; }
            .char-icon { font-size: 22px; }
        }
    </style>
</head>
<body>

    <canvas id="emberCanvas"></canvas>
    <canvas id="dragonCanvas"></canvas>
    <canvas id="magicCanvas"></canvas>

    <div class="main">
        <div class="title-wrap">
            <div class="dragon-glyph">🐉</div>
            <div class="title-text">龙 族</div>
            <div class="title-sub">D R A G O N &nbsp; R A J A</div>
        </div>

        <div class="quote">
            「凡王之血<br>必以剑终」<br><br>
            <em>—— 路明非</em>
        </div>

        <div class="runes">
            <div class="rune">竜</div>
            <div class="rune">剣</div>
            <div class="rune">炎</div>
            <div class="rune">契</div>
            <div class="rune">龍</div>
        </div>

        <div class="chars">
            <div class="char-card">
                <div class="char-icon">🗡️</div>
                <div class="char-name">路明非</div>
                <div class="char-desc">S级·白王</div>
            </div>
            <div class="char-card">
                <div class="char-icon">⚔️</div>
                <div class="char-name">楚子航</div>
                <div class="char-desc">狮心会·村雨</div>
            </div>
            <div class="char-card">
                <div class="char-icon">🛡️</div>
                <div class="char-name">凯撒</div>
                <div class="char-desc">学生会·狄克推多</div>
            </div>
            <div class="char-card">
                <div class="char-icon">🏹</div>
                <div class="char-name">诺诺</div>
                <div class="char-desc">陈墨瞳·红发</div>
            </div>
        </div>

        <!-- 热门图片 -->
        <div class="gallery">
            <div class="gallery-item">
                <img src="https://haowallpaper.com/link/common/file/previewFileImg/16457932973198720"
                     alt="路明非 & 楚子航" loading="lazy">
                <div class="gallery-label">路明非 & 楚子航</div>
            </div>
            <div class="gallery-item">
                <img src="https://haowallpaper.com/link/common/file/previewFileImg/16457968667774336"
                     alt="龙族·插图" loading="lazy">
                <div class="gallery-label">龙族·经典场景</div>
            </div>
            <div class="gallery-item">
                <img src="https://haowallpaper.com/link/common/file/previewFileImg/18081895687179648"
                     alt="夏弥 & 楚子航" loading="lazy">
                <div class="gallery-label">夏弥 & 楚子航</div>
            </div>
            <div class="gallery-item">
                <img src="https://haowallpaper.com/link/common/file/previewFileImg/18770913792937344"
                     alt="路明非" loading="lazy">
                <div class="gallery-label">路明非</div>
            </div>
        </div>
    </div>

    <div class="bottom">— 卡塞尔学院 —</div>

    <script>
    (function() {
        // === Ember Canvas (floating fire particles) ===
        const emberCanvas = document.getElementById('emberCanvas');
        const ectx = emberCanvas.getContext('2d');
        let embers = [];

        function resizeEmber() {
            emberCanvas.width = window.innerWidth;
            emberCanvas.height = window.innerHeight;
        }
        resizeEmber();
        window.addEventListener('resize', resizeEmber);

        function createEmber() {
            return {
                x: Math.random() * emberCanvas.width,
                y: emberCanvas.height + 20,
                r: 1 + Math.random() * 3,
                vx: (Math.random() - 0.5) * 0.5,
                vy: -(0.3 + Math.random() * 1.2),
                life: 1, decay: 0.003 + Math.random() * 0.008,
                hue: 15 + Math.random() * 30 // orange-red range
            };
        }

        // Init embers
        for (let i = 0; i < 40; i++) {
            const e = createEmber();
            e.y = Math.random() * emberCanvas.height;
            e.life = Math.random();
            embers.push(e);
        }

        setInterval(() => {
            if (embers.length < 60) embers.push(createEmber());
        }, 200);

        function drawEmbers() {
            ectx.clearRect(0, 0, emberCanvas.width, emberCanvas.height);
            for (let i = embers.length - 1; i >= 0; i--) {
                const e = embers[i];
                e.x += e.vx;
                e.y += e.vy;
                e.life -= e.decay;
                if (e.life <= 0) { embers.splice(i, 1); continue; }
                const alpha = e.life;
                const glow = ectx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * 3);
                glow.addColorStop(0, `hsla(${e.hue}, 100%, 60%, ${alpha})`);
                glow.addColorStop(0.5, `hsla(${e.hue}, 100%, 40%, ${alpha * 0.4})`);
                glow.addColorStop(1, 'transparent');
                ectx.fillStyle = glow;
                ectx.beginPath();
                ectx.arc(e.x, e.y, e.r * 3, 0, Math.PI * 2);
                ectx.fill();
            }
        }

        // === Dragon Canvas (subtle scale pattern + eye glow) ===
        const dragonCanvas = document.getElementById('dragonCanvas');
        const dctx = dragonCanvas.getContext('2d');
        let dragonPhase = 0;

        function resizeDragon() {
            dragonCanvas.width = window.innerWidth;
            dragonCanvas.height = window.innerHeight;
        }
        resizeDragon();
        window.addEventListener('resize', resizeDragon);

        function drawDragon() {
            dctx.clearRect(0, 0, dragonCanvas.width, dragonCanvas.height);
            const cx = dragonCanvas.width / 2;
            const cy = dragonCanvas.height * 0.35;

            // Subtle dragon eye glow
            dragonPhase += 0.02;
            const pulse = 0.3 + Math.sin(dragonPhase) * 0.15;
            const glow = dctx.createRadialGradient(cx, cy, 20, cx, cy, 250);
            glow.addColorStop(0, `rgba(200, 40, 20, ${pulse})`);
            glow.addColorStop(0.3, `rgba(180, 30, 15, ${pulse * 0.6})`);
            glow.addColorStop(0.7, 'rgba(80, 10, 5, 0.05)');
            glow.addColorStop(1, 'transparent');
            dctx.fillStyle = glow;
            dctx.fillRect(0, 0, dragonCanvas.width, dragonCanvas.height);

            // Subtle V-shaped dragon scale hints
            dctx.strokeStyle = 'rgba(180, 120, 60, 0.04)';
            dctx.lineWidth = 1;
            const rows = 8;
            const spacing = dragonCanvas.width / (rows + 1);
            for (let r = 1; r <= rows; r++) {
                const x = r * spacing;
                dctx.beginPath();
                dctx.moveTo(x, 0);
                dctx.lineTo(x, dragonCanvas.height);
                dctx.stroke();
            }
        }

        function animate() {
            drawEmbers();
            drawDragon();
            drawMagic();
            requestAnimationFrame(animate);
        }
        animate();

        // ============ 魔幻交互系统 ============
        const magicCanvas = document.getElementById('magicCanvas');
        const mctx = magicCanvas.getContext('2d');
        let magicFX = [];        // active effects
        let energyTrail = [];    // drag trail particles
        let isDragging = false;
        let pressTimer = null;
        let lastPos = { x: 0, y: 0 };

        function resizeMagic() {
            magicCanvas.width = window.innerWidth;
            magicCanvas.height = window.innerHeight;
        }
        resizeMagic();
        window.addEventListener('resize', resizeMagic);

        // === 拖拽能量轨迹 ===
        function addTrailPoint(x, y) {
            energyTrail.push({
                x, y, life: 1, size: 2 + Math.random() * 4,
                hue: 30 + Math.random() * 20
            });
            if (energyTrail.length > 60) energyTrail.shift();
        }

        // === 点击：召唤魔法阵 ===
        function summonCircle(x, y) {
            const runes = ['竜','炎','剣','契','龍','暗','焔','魂'];
            for (let ring = 0; ring < 3; ring++) {
                const count = 8 + ring * 6;
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 / count) * i;
                    const radius = 30 + ring * 25 + Math.random() * 10;
                    magicFX.push({
                        type: 'particle',
                        x, y, angle, radius,
                        life: 1, speed: 1 + Math.random() * 2,
                        size: 2 + Math.random() * 3,
                        hue: ring === 0 ? 35 : ring === 1 ? 15 : 45,
                        rune: i % 3 === 0 && ring === 2 ? runes[i % runes.length] : null
                    });
                }
            }
            // 中心符文
            magicFX.push({
                type: 'centerRune',
                x, y, life: 1.5, size: 40,
                text: runes[Math.floor(Math.random() * runes.length)]
            });
        }

        // === 长按：龙瞳 ===
        function openDragonEye(x, y) {
            magicFX.push({
                type: 'dragonEye',
                x, y, life: 2, radius: 0, maxRadius: 60
            });
        }

        // === 绘制魔幻特效 ===
        function drawMagic() {
            mctx.clearRect(0, 0, magicCanvas.width, magicCanvas.height);

            // 能量轨迹
            if (energyTrail.length > 1) {
                for (let i = 1; i < energyTrail.length; i++) {
                    const p = energyTrail[i];
                    const pp = energyTrail[i - 1];
                    p.life -= 0.03;
                    if (p.life <= 0) continue;
                    const alpha = p.life * 0.6;
                    mctx.strokeStyle = `hsla(${p.hue}, 100%, 60%, ${alpha})`;
                    mctx.lineWidth = p.size * p.life;
                    mctx.lineCap = 'round';
                    mctx.shadowColor = `hsla(${p.hue}, 100%, 50%, ${alpha})`;
                    mctx.shadowBlur = 10;
                    mctx.beginPath();
                    mctx.moveTo(pp.x, pp.y);
                    mctx.lineTo(p.x, p.y);
                    mctx.stroke();
                    mctx.shadowBlur = 0;
                }
                energyTrail = energyTrail.filter(p => p.life > 0);
            }

            // 魔法特效
            for (let i = magicFX.length - 1; i >= 0; i--) {
                const fx = magicFX[i];
                fx.life -= 0.02;
                if (fx.life <= 0) { magicFX.splice(i, 1); continue; }

                const alpha = Math.min(fx.life, 1);

                if (fx.type === 'particle') {
                    const px = fx.x + Math.cos(fx.angle) * fx.radius * (1 - fx.life);
                    const py = fx.y + Math.sin(fx.angle) * fx.radius * (1 - fx.life);
                    fx.radius += fx.speed * 0.5;

                    mctx.fillStyle = `hsla(${fx.hue}, 100%, 60%, ${alpha})`;
                    mctx.shadowColor = `hsla(${fx.hue}, 100%, 50%, ${alpha})`;
                    mctx.shadowBlur = 8;
                    mctx.beginPath();
                    mctx.arc(px, py, fx.size * alpha, 0, Math.PI * 2);
                    mctx.fill();
                    mctx.shadowBlur = 0;

                    if (fx.rune) {
                        mctx.fillStyle = `rgba(212, 168, 67, ${alpha})`;
                        mctx.font = `${12 * alpha}px serif`;
                        mctx.fillText(fx.rune, px - 6, py + 4);
                    }
                }
                else if (fx.type === 'centerRune') {
                    const s = fx.size * alpha;
                    fx.size += 1;
                    mctx.fillStyle = `rgba(212, 168, 67, ${alpha * 0.8})`;
                    mctx.font = `bold ${s}px "STKaiti", "KaiTi", serif`;
                    mctx.shadowColor = `rgba(200, 40, 20, ${alpha * 0.5})`;
                    mctx.shadowBlur = 20;
                    mctx.textAlign = 'center';
                    mctx.fillText(fx.text, fx.x, fx.y + s / 3);
                    mctx.shadowBlur = 0;

                    // 光环
                    mctx.strokeStyle = `rgba(212, 168, 67, ${alpha * 0.4})`;
                    mctx.lineWidth = 2;
                    mctx.beginPath();
                    mctx.arc(fx.x, fx.y, s * 1.2, 0, Math.PI * 2);
                    mctx.stroke();
                }
                else if (fx.type === 'dragonEye') {
                    fx.radius += (fx.maxRadius - fx.radius) * 0.1;
                    const r = fx.radius;
                    const pulse = 0.7 + Math.sin(Date.now() * 0.005) * 0.3;

                    // 瞳孔
                    const eyeGrad = mctx.createRadialGradient(fx.x, fx.y, r * 0.1, fx.x, fx.y, r);
                    eyeGrad.addColorStop(0, `rgba(0,0,0,${alpha})`);
                    eyeGrad.addColorStop(0.15, `rgba(200,40,20,${alpha * pulse})`);
                    eyeGrad.addColorStop(0.3, `rgba(180,30,10,${alpha * 0.8})`);
                    eyeGrad.addColorStop(0.6, `rgba(80,10,0,${alpha * 0.4})`);
                    eyeGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    mctx.fillStyle = eyeGrad;
                    mctx.beginPath();
                    mctx.arc(fx.x, fx.y, r, 0, Math.PI * 2);
                    mctx.fill();

                    // 竖直瞳孔线
                    mctx.strokeStyle = `rgba(0,0,0,${alpha * 0.9})`;
                    mctx.lineWidth = r * 0.08;
                    mctx.beginPath();
                    mctx.moveTo(fx.x, fx.y - r * 0.35);
                    mctx.lineTo(fx.x, fx.y + r * 0.35);
                    mctx.stroke();
                }
            }
        }

        // === 事件监听（绑定到document，不拦截滚动） ===
        function getPos(e) {
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX, y: t.clientY };
        }
        function isInteractiveTarget(e) {
            const el = e.target;
            return el.closest('.gallery') || el.closest('.char-card') || el.tagName === 'A' || el.tagName === 'IMG';
        }

        document.addEventListener('touchstart', (e) => {
            if (isInteractiveTarget(e)) return;
            const p = getPos(e);
            lastPos = p;
            isDragging = false;
            energyTrail = [];
            pressTimer = setTimeout(() => {
                isDragging = true;
                openDragonEye(p.x, p.y);
            }, 500);
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (isInteractiveTarget(e) || !isDragging) return;
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            const p = getPos(e);
            addTrailPoint(p.x, p.y);
            lastPos = p;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
                if (!isDragging) summonCircle(lastPos.x, lastPos.y);
            }
            isDragging = false;
        });

        // 鼠标支持
        document.addEventListener('mousedown', (e) => {
            if (isInteractiveTarget(e)) return;
            const p = { x: e.clientX, y: e.clientY };
            lastPos = p;
            isDragging = false;
            energyTrail = [];
            pressTimer = setTimeout(() => {
                isDragging = true;
                openDragonEye(p.x, p.y);
            }, 500);
        });
        document.addEventListener('mousemove', (e) => {
            if (e.buttons !== 1 || isInteractiveTarget(e) || !isDragging) return;
            if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            const p = { x: e.clientX, y: e.clientY };
            addTrailPoint(p.x, p.y);
            lastPos = p;
        });
        document.addEventListener('mouseup', (e) => {
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
                if (!isDragging) summonCircle(lastPos.x, lastPos.y);
            }
            isDragging = false;
        });
    })();
    </script>
</body>
</html>
